services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/collab_platform
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_strong_secret}
      JWT_EXPIRES_IN: 7d
      ENABLE_REDIS: ${ENABLE_REDIS:-false}
      REDIS_URL: redis://redis:6379
      YJS_REDIS_CHANNEL: collab:yjs:update
      SERVER_ID: server-1
      API_RATE_LIMIT_WINDOW_MS: 900000
      API_RATE_LIMIT_MAX: 300
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_RATE_LIMIT_MAX: 30
      SOCKET_RATE_WINDOW_MS: 10000
      SOCKET_RATE_MAX_EVENTS: 120
      MAX_YJS_UPDATE_BYTES: 262144
      MAX_AWARENESS_UPDATE_BYTES: 32768
      MAX_JSON_BODY: 1mb
    depends_on:
      - mongo
      - redis

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
